<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=GFS+Didot&display=swap" rel="stylesheet">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>고전 그리스어 어휘 · 알파벳 학습</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, -apple-system, sans-serif; background: #F5F0E8; color: #1a1a1a; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

/* ── Header ── */
.header { background: #fff; border-bottom: 0.5px solid #E8DFC8; padding: 0.75rem 1.25rem; flex-shrink: 0; display: flex; align-items: center; gap: 1rem; }
.header h1 { font-size: 16px; font-weight: 500; color: #333; }

/* ── Search bar ── */
.searchbar { background: #fff; border-bottom: 0.5px solid #E8DFC8; padding: 0.6rem 1.25rem; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; flex-shrink: 0; }
.searchbar input { flex: 1; min-width: 180px; font-size: 15px; border: 0.5px solid #ddd; border-radius: 8px; padding: 7px 12px; outline: none; }
.searchbar input:focus { border-color: #C9922A; }
.searchbar input::placeholder { color: #bbb; font-size: 13px; }
.filters { display: flex; gap: 6px; flex-wrap: wrap; }
.fb { border: 0.5px solid #ddd; background: #fff; border-radius: 20px; padding: 4px 12px; font-size: 11px; cursor: pointer; color: #555; white-space: nowrap; }
.fb:hover { background: #f0f0ee; }
.fb.active { background: #C9922A; border-color: #C9922A; color: #fff; }
.fb.nt.active  { background: #4A6FA5; border-color: #4A6FA5; }
.fb.lxx.active { background: #6B5FAA; border-color: #6B5FAA; }
.fb.homer.active { background: #A0522D; border-color: #A0522D; }
.fb.liturgy.active { background: #C9922A; border-color: #C9922A; }

/* ── Main area ── */
.main { flex: 1; display: flex; overflow: hidden; }

/* ── LEFT: word panel ── */
.word-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; border-right: 0.5px solid #E8DFC8; }
.word-list-header { padding: 0.5rem 1.25rem; font-size: 11px; color: #aaa; background: #F5F0E8; border-bottom: 0.5px solid #eee; flex-shrink: 0; display: flex; justify-content: space-between; align-items: center; }
.mode-btn { border: 0.5px solid #ddd; background: #fff; border-radius: 6px; padding: 4px 10px; font-size: 11px; cursor: pointer; color: #555; }
.mode-btn:hover { background: #f0f0ee; }
.mode-btn.active-mode { background: #C9922A; color: #fff; border-color: #C9922A; }

.word-nav { display: flex; gap: 8px; align-items: center; }
.nav-btn { border: 0.5px solid #ddd; background: #fff; border-radius: 8px; padding: 6px 14px; font-size: 13px; cursor: pointer; color: #555; }
.nav-btn:hover { background: #f0f0ee; }
.nav-counter { font-size: 12px; color: #aaa; flex: 1; text-align: center; }

.big-word { background: #fff; border: 0.5px solid #E8DFC8; border-left: 3px solid #C9922A; border-radius: 12px; padding: 1.5rem 1.5rem; }
.big-greek { font-size: 44px; font-weight: 400; color: #1a1a1a; line-height: 1.1; margin-bottom: 0.4rem; font-family: "GFS Didot", Georgia, serif; }
.big-pron { font-size: 16px; color: #555; margin-bottom: 4px; }
.big-pron .en { color: #bbb; font-style: italic; font-size: 12px; margin-left: 6px; }
.big-meaning { font-size: 22px; font-weight: 500; color: #333; margin-top: 0.6rem; }
.big-pos { font-size: 12px; color: #bbb; margin-top: 4px; }
.big-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 0.75rem; }
.tag { font-size: 10px; padding: 2px 7px; border-radius: 10px; font-weight: 500; }
.tag.nt  { background:#EAF0FA; color:#2E4F8A; }
.tag.lxx { background:#F0EEF8; color:#4A3D8A; }
.tag.homer { background:#FAECE7; color:#8B3A1A; }
.tag.liturgy { background:#FDF3DC; color:#8B6914; }
.big-note { font-size: 12px; color: #888; margin-top: 0.5rem; padding-top: 0.5rem; border-top: 0.5px solid #f0f0f0; }

.letter-strip { display: flex; gap: 6px; flex-wrap: wrap; }
.lbox { border: 0.5px solid #ddd; border-radius: 8px; padding: 10px 12px; text-align: center; min-width: 52px; cursor: pointer; transition: all 0.1s; background: #fafaf8; }
.lbox:hover { background: #f0f0f0; }
.lbox.lactive { border-color: #C9922A; background: #FDF3DC; }
.lchar { font-size: 24px; font-weight: 400; display: block; font-family: "GFS Didot", Georgia, serif; }
.lsound { font-size: 12px; color: #aaa; display: block; margin-top: 3px; }

.lcard { background: #fff; border: 0.5px solid #e0e0e0; border-radius: 10px; padding: 0.75rem 0.9rem; cursor: pointer; transition: all 0.1s; }
.lcard:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.07); transform: translateY(-1px); }
.lcard.selected { border-color: #C9922A; background: #f0faf6; }
.lcard-greek { font-size: 18px; font-weight: 400; color: #1a1a1a; font-family: "GFS Didot", Georgia, serif; }
.lcard-pron { font-size: 13px; color: #555; margin-top: 2px; }
.lcard-pron .en { color: #bbb; font-style: italic; font-size: 11px; margin-left: 4px; }
.lcard-meaning { font-size: 13px; color: #333; margin-top: 4px; font-weight: 500; }
.lcard-tags { display: flex; gap: 3px; flex-wrap: wrap; margin-top: 6px; }
.empty { padding: 3rem 1rem; text-align: center; color: #bbb; font-size: 14px; }

/* ── RIGHT: alphabet panel ── */
.alpha-panel { width: 55%; flex-shrink: 0; background: #FFFDF7; border-left: 0.5px solid #E8DFC8; display: flex; flex-direction: column; overflow: hidden; }
.alpha-header { padding: 0.85rem 1.25rem; font-size: 13px; color: #aaa; border-bottom: 0.5px solid #E8DFC8; flex-shrink: 0; font-weight: 500; }
.alpha-grid { padding: 1rem; display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; overflow-y: auto; flex: 1; align-content: start; }
.apc { border: 0.5px solid #e8e8e8; border-radius: 10px; padding: 18px 6px; text-align: center; }
.apc.known   { border-color: #C9922A; background: #FDF3DC; }
.apc.similar { border-color: #4A6FA5; background: #EAF0FA; }
.apc.lit     { border-color: #C9922A !important; background: #FDF3DC !important; box-shadow: 0 0 0 2px rgba(201,146,42,0.2); }
.apc .ag { font-size: 26px; font-weight: 400; display: block; color: #1a1a1a; line-height: 1.1; font-family: "GFS Didot", Georgia, serif; }
.apc .an { font-size: 12px; color: #888; display: block; margin-top: 5px; }
.apc .as { font-size: 14px; font-weight: 500; color: #555; display: block; margin-top: 3px; }

.legend { padding: 0.5rem 0.9rem; border-top: 0.5px solid #eee; flex-shrink: 0; }
.leg { display: flex; align-items: center; gap: 4px; font-size: 10px; color: #888; margin-bottom: 3px; }
.ldot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }

.active-box-left {
  padding: 0; background: #fff; border: 0.5px solid #E8DFC8; border-left: 3px solid #C9922A;
  border-radius: 12px; overflow: hidden; max-height: 0; opacity: 0;
  transition: max-height 0.3s ease, opacity 0.25s ease, padding 0.3s ease; flex-shrink: 0;
}
.active-box-left.revealed { max-height: 160px; opacity: 1; padding: 1.25rem 1.5rem; }
.active-box-left .alpha-active-greek { font-size: 48px; font-weight: 400; color: #1a1a1a; font-family: "GFS Didot", Georgia, serif; }
.active-box-left .alpha-active-info .sound { color: #C9922A; font-weight: 500; }

.view-slider { flex: 1; position: relative; overflow: hidden; }
.study-view, .list-view, .train-view {
  position: absolute; inset: 0; overflow-y: auto;
  transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1); background: #F5F0E8;
}
.study-view { padding: 1rem 1.1rem; display: flex; flex-direction: column; gap: 0.75rem; transform: translateX(0%); }
.list-view { padding: 0.75rem 1rem; display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 8px; align-content: start; transform: translateX(100%); }
.train-view { padding: 1rem 1.1rem; display: flex; flex-direction: column; gap: 0.75rem; transform: translateX(200%); }

.view-slider.show-list .study-view { transform: translateX(-100%); }
.view-slider.show-list .list-view  { transform: translateX(0%); }
.view-slider.show-list .train-view { transform: translateX(100%); }
.view-slider.show-train .study-view { transform: translateX(-100%); }
.view-slider.show-train .list-view  { transform: translateX(-100%); }
.view-slider.show-train .train-view { transform: translateX(0%); }

/* ── TRAINING MODE ── */
.train-tabs { display: flex; gap: 6px; }
.train-tab { border: 0.5px solid #E8DFC8; background: #fff; border-radius: 20px; padding: 5px 16px; font-size: 12px; cursor: pointer; color: #888; }
.train-tab:hover { background: #FDF3DC; }
.train-tab.active { background: #C9922A; border-color: #C9922A; color: #fff; }

.train-card {
  background: #fff; border: 0.5px solid #E8DFC8; border-left: 3px solid #C9922A;
  border-radius: 12px; padding: 1.5rem; display: flex; flex-direction: column;
  align-items: center; gap: 0.5rem; min-height: 200px; position: relative;
}
.train-prompt { font-size: 80px; font-family: "GFS Didot", Georgia, serif; color: #1a1a1a; line-height: 1; text-align: center; }
.train-subprompt { font-size: 14px; color: #aaa; margin-top: 0.25rem; }
.train-input-row { display: flex; gap: 8px; }
.train-input { font-size: 18px; border: 0.5px solid #E8DFC8; border-radius: 8px; padding: 10px 16px; outline: none; flex: 1; text-align: center; background: #fff; }
.train-input:focus { border-color: #C9922A; }
.train-submit { background: #C9922A; color: #fff; border: none; border-radius: 8px; padding: 10px 20px; font-size: 14px; cursor: pointer; }
.train-submit:hover { background: #8B6914; }

/* Feedback area */
.feedback-area { min-height: 80px; width: 100%; }
.train-feedback { text-align: center; font-size: 15px; min-height: 24px; font-weight: 500; }
.train-feedback.correct { color: #C9922A; }
.train-feedback.wrong { color: #A0522D; }
.train-hint { font-size: 13px; color: #888; text-align: center; }

/* Contextual feedback box */
.ctx-feedback {
  background: #FFFDF7; border: 0.5px solid #E8DFC8; border-radius: 10px;
  padding: 0.75rem 1rem; margin-top: 0.5rem; width: 100%;
  animation: fadeSlideIn 0.3s ease;
}
.ctx-feedback.trap-feedback { border-left: 3px solid #A0522D; background: #FFF9F6; }
.ctx-feedback.correct-feedback { border-left: 3px solid #C9922A; background: #FFFDF7; }
.ctx-feedback .ctx-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
.ctx-feedback.trap-feedback .ctx-title { color: #A0522D; }
.ctx-feedback.correct-feedback .ctx-title { color: #C9922A; }
.ctx-feedback .ctx-body { font-size: 13px; color: #555; line-height: 1.5; }
.ctx-feedback .ctx-example { font-family: "GFS Didot", Georgia, serif; font-size: 15px; color: #1a1a1a; margin-top: 4px; }

/* Streak badge */
.streak-badge {
  position: absolute; top: 12px; right: 16px;
  background: linear-gradient(135deg, #C9922A 0%, #E8B84B 100%);
  color: #fff; border-radius: 20px; padding: 3px 12px; font-size: 12px; font-weight: 600;
  display: none; align-items: center; gap: 4px;
  box-shadow: 0 2px 8px rgba(201,146,42,0.3);
}
.streak-badge.visible { display: flex; }
.streak-badge .streak-fire { font-size: 14px; }

/* Level badge on alpha card */
.alpha-level-dot {
  width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-top: 4px;
}
.alpha-level-dot.lv0 { background: #ddd; }
.alpha-level-dot.lv1 { background: #E8B84B; }
.alpha-level-dot.lv2 { background: #C9922A; }
.alpha-level-dot.lv3 { background: #8B6914; box-shadow: 0 0 4px rgba(201,146,42,0.5); }

/* Stage indicator */
.stage-bar { display: flex; gap: 6px; align-items: center; margin-bottom: 0.75rem; }
.stage-pill { border: 0.5px solid #E8DFC8; border-radius: 20px; padding: 4px 14px; font-size: 11px; color: #aaa; background: #f5f5f3; cursor: pointer; }
.stage-pill.unlocked { border-color: #C9922A; color: #8B6914; background: #FDF3DC; }
.stage-pill.current { background: #C9922A; color: #fff; border-color: #C9922A; font-weight: 600; }
.stage-pill.locked { opacity: 0.4; cursor: default; }
.stage-pill .lock-icon { font-size: 10px; margin-left: 3px; }

/* Word trainer */
.word-trainer-word { font-size: 36px; font-family: "GFS Didot", Georgia, serif; color: #1a1a1a; text-align: center; margin-bottom: 0.5rem; }
.letter-progress { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; margin: 0.5rem 0; }
.lp-box { border: 0.5px solid #E8DFC8; border-radius: 6px; padding: 6px 8px; min-width: 36px; text-align: center; background: #fafaf8; transition: all 0.15s; }
.lp-box.done { background: #FDF3DC; border-color: #C9922A; }
.lp-box.current { background: #fff; border-color: #C9922A; border-width: 2px; }
.lp-box.wrong-flash { background: #FAECE7; border-color: #A0522D; }
.lp-char { font-size: 18px; font-family: "GFS Didot", Georgia, serif; display: block; }
.lp-sound { font-size: 10px; color: #aaa; display: block; }
.lp-sound.revealed { color: #C9922A; font-weight: 500; }

/* Stats */
.stats-panel { background: #fff; border: 0.5px solid #E8DFC8; border-radius: 12px; padding: 1rem 1.25rem; }
.stats-section { margin-bottom: 1rem; }
.stats-section-title { font-size: 11px; color: #C9922A; font-weight: 600; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
.stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 0.75rem; }
.stat-box { background: #F5F0E8; border-radius: 8px; padding: 0.6rem; text-align: center; }
.stat-num { font-size: 20px; font-weight: 600; color: #C9922A; display: block; }
.stat-lbl { font-size: 10px; color: #888; display: block; margin-top: 2px; }
.weak-list { display: flex; gap: 6px; flex-wrap: wrap; }
.weak-item { background: #FAECE7; border: 0.5px solid #A0522D; border-radius: 6px; padding: 4px 10px; font-size: 13px; font-family: "GFS Didot", Georgia, serif; color: #8B3A1A; display: flex; align-items: center; gap: 4px; }
.weak-item .wi-sub { font-size: 10px; color: #A0522D; font-family: system-ui, sans-serif; }
.alpha-stats-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 5px; }
.asg-item { border: 0.5px solid #E8DFC8; border-radius: 6px; padding: 5px 3px; text-align: center; background: #fafaf8; position: relative; }
.asg-item.asg-good { border-color: #C9922A; background: #FDF3DC; }
.asg-item.asg-bad  { border-color: #A0522D; background: #FAECE7; }
.asg-item.asg-none { opacity: 0.4; }
.asg-item.asg-mastered { border-color: #8B6914; background: #F5EDD5; box-shadow: inset 0 0 0 1px #C9922A; }
.asg-char { font-size: 14px; font-family: "GFS Didot", Georgia, serif; display: block; color: #1a1a1a; }
.asg-rate { font-size: 9px; color: #888; display: block; margin-top: 1px; }
.asg-level { font-size: 8px; display: block; margin-top: 1px; }
.word-stat-row { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; border-bottom: 0.5px solid #F5F0E8; font-size: 12px; }
.word-stat-row:last-child { border-bottom: none; }
.word-stat-greek { font-family: "GFS Didot", Georgia, serif; font-size: 14px; color: #1a1a1a; }
.word-stat-meaning { color: #888; font-size: 11px; }
.word-stat-rate { font-weight: 600; color: #C9922A; min-width: 36px; text-align: right; }
.word-stat-rate.bad { color: #A0522D; }

/* Mastery progress bar */
.mastery-bar { background: #F5F0E8; border-radius: 8px; height: 8px; overflow: hidden; margin-top: 4px; }
.mastery-fill { height: 100%; border-radius: 8px; transition: width 0.5s ease; background: linear-gradient(90deg, #E8B84B, #C9922A, #8B6914); }
.mastery-label { font-size: 11px; color: #888; margin-top: 4px; }

/* Gold flash animation */
@keyframes goldFlash {
  0% { box-shadow: 0 0 0 0 rgba(201,146,42,0.4); }
  50% { box-shadow: 0 0 20px 4px rgba(201,146,42,0.3); }
  100% { box-shadow: 0 0 0 0 rgba(201,146,42,0); }
}
@keyframes fadeSlideIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes levelUp {
  0% { transform: scale(1); }
  50% { transform: scale(1.15); }
  100% { transform: scale(1); }
}
.gold-flash { animation: goldFlash 0.6s ease; }
.level-up-anim { animation: levelUp 0.4s ease; }

.auth-bar { display: flex; align-items: center; gap: 10px; margin-left: auto; }
.auth-info { font-size: 12px; color: #888; }
.auth-btn { border: 0.5px solid #E8DFC8; background: #fff; border-radius: 6px; padding: 5px 14px; font-size: 12px; cursor: pointer; color: #C9922A; font-weight: 500; white-space: nowrap; }
.auth-btn:hover { background: #FDF3DC; }

/* History panel */
.hist-panel { background: #fff; border: 0.5px solid #E8DFC8; border-radius: 12px; padding: 0.75rem 1rem; margin-top: 0.5rem; }
.hist-title { font-size: 11px; color: #C9922A; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
.hist-row { display: flex; align-items: center; gap: 8px; padding: 5px 0; border-bottom: 0.5px solid #F5F0E8; font-size: 13px; }
.hist-row:last-child { border-bottom: none; }
.hist-icon { font-weight: 600; width: 16px; text-align: center; }
.hist-correct .hist-icon { color: #C9922A; }
.hist-wrong .hist-icon { color: #A0522D; }
.hist-greek { font-family: "GFS Didot", Georgia, serif; font-size: 15px; color: #1a1a1a; min-width: 60px; }
.hist-detail { font-size: 11px; color: #888; flex: 1; }
.hist-speak { cursor: pointer; font-size: 14px; opacity: 0.5; transition: opacity 0.15s; }
.hist-speak:hover { opacity: 1; }

@media (max-width: 700px) {
  .alpha-panel { width: 48%; }
}
</style>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyB_FtF3DfUatyvhnpFWtJnfhI7UvUp0sgw",
    authDomain: "gr-lan-practice.firebaseapp.com",
    projectId: "gr-lan-practice",
    storageBucket: "gr-lan-practice.firebasestorage.app",
    messagingSenderId: "487642891418",
    appId: "1:487642891418:web:3c0693a7b85623c9944b23"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();
  const provider = new firebase.auth.GoogleAuthProvider();

  auth.onAuthStateChanged(user => {
    window._fbUser = user;
    const btn = document.getElementById('auth-btn');
    const info = document.getElementById('auth-info');
    if(user) {
      if(btn) btn.textContent = '로그아웃';
      if(info) info.textContent = user.displayName || user.email;
      loadUserStats(user.uid);
    } else {
      if(btn) btn.textContent = 'Google 로그인';
      if(info) info.textContent = '';
    }
  });

  window.fbToggleAuth = () => {
    if(window._fbUser) auth.signOut();
    else auth.signInWithPopup(provider).catch(e => console.error(e));
  };

  window.fbSaveStats = async (stats) => {
    const user = window._fbUser;
    if(!user) return;
    try {
      await db.collection('users').doc(user.uid).collection('stats').doc('main').set({
        total: stats.total, correct: stats.correct,
        letters: stats.letters, words: stats.words,
        mastery: stats.mastery,
        updatedAt: new Date().toISOString()
      }, { merge: true });
    } catch(e) { console.error('Save error:', e); }
  };

  window.fbLoadStats = async (uid) => {
    try {
      const snap = await db.collection('users').doc(uid).collection('stats').doc('main').get();
      if(snap.exists) return snap.data();
    } catch(e) { console.error('Load error:', e); }
    return null;
  };

  async function loadUserStats(uid) {
    const data = await window.fbLoadStats(uid);
    if(data && window.loadTrainStats) window.loadTrainStats(data);
  }
</script>
</head>
<body>
<div class="header">
  <div style="display:flex; align-items:baseline; gap:0.75rem; flex-wrap:wrap;">
    <h1 style="font-size:20px; font-weight:600; letter-spacing:-0.01em;">고전 그리스어 어휘 · 알파벳 학습</h1>
    <span style="font-family:'GFS Didot',Georgia,serif; font-size:15px; color:#C9922A; font-weight:400; letter-spacing:0.02em;">Ἑλληνικὸν Λεξικόν</span>
  </div>
  <div class="auth-bar">
    <span class="auth-info" id="auth-info"></span>
    <button class="auth-btn" id="auth-btn" onclick="typeof fbToggleAuth!=='undefined' ? fbToggleAuth() : alert('브라우저에서 파일을 직접 열어주세요.')">Google 로그인</button>
  </div>

// ── Helpers ──
function tok(s){ return (s||'').replace(/[\s\/·\-()']/g,'').toLowerCase(); }

// Fuzzy Korean pronunciation matching
// 퀴리에↔키리에, 휘오스↔히오스, 뤼시스↔리시스 등
function fuzzyKr(s) {
  const map = [
    ['퀴','키'],['휘','히'],['뤼','리'],['뮈','미'],['쉬','시'],['뷔','비'],
    ['프','피'],['크','키'],['에우','유'],['아이','애'],['오이','외'],['에이','이'],
    ['테','세'],['파','바'],['타','다'],['카','가'],['프네','네'],
    ['앙','앙'],['엘레','엘레'],
  ];
  const variants = [tok(s)];
  map.forEach(([a,b]) => {
    const t = tok(s);
    if(t.includes(a)) variants.push(t.replaceAll(a,b));
    if(t.includes(b)) variants.push(t.replaceAll(b,a));
  });
  return variants;
}

function fuzzyMatch(haystack, needle) {
  const h = tok(haystack);
  const needleVariants = fuzzyKr(needle);
  return needleVariants.some(n => h.includes(n));
}
function findAlphaIdx(ch){
  // Direct match first
  let idx = ALPHA.findIndex(a=>a.keys&&a.keys.includes(ch));
  if(idx >= 0) return idx;
  // Fallback: strip diacritics via Unicode NFD decomposition and match base char
  const base = ch.normalize('NFD').replace(/[\u0300-\u036f\u0342\u0343\u0344\u0345\u0313\u0314\u0301\u0300\u0308\u0303\u0304\u0306\u0307\u030A\u030B\u030C\u0327\u0328\u1FBF\u1FFE\u1FCD\u1FDD\u1FCE\u1FDE\u1FCF\u1FDF]/g, '');
  if(base !== ch) {
    idx = ALPHA.findIndex(a=>a.keys&&a.keys.includes(base));
    if(idx >= 0) return idx;
    // Also try lowercase
    const baseLower = base.toLowerCase();
    idx = ALPHA.findIndex(a=>a.keys&&a.keys.includes(baseLower));
    if(idx >= 0) return idx;
  }
  return -1;
}

function highlightAlpha(alphaIdx){
  document.querySelectorAll('.apc').forEach(el=>el.classList.remove('lit'));
  const box = document.getElementById('alpha-active-box');
  if(alphaIdx < 0){ box.classList.remove('revealed'); return; }
  document.getElementById('apc-'+alphaIdx).classList.add('lit');
  const a = ALPHA[alphaIdx];
  box.innerHTML =
    '<div class="alpha-active-greek">'+a.g+'</div>'+
    '<div class="alpha-active-info">'+a.n+' &nbsp;·&nbsp; 소리: <span class="sound">'+a.s+'</span></div>';
  box.classList.add('revealed');
  document.getElementById('apc-'+alphaIdx).scrollIntoView({block:'nearest',behavior:'smooth'});
}

function clickLetter(ch, lboxId){
  document.querySelectorAll('.lbox').forEach(el=>el.classList.remove('lactive'));
  const lb = document.getElementById(lboxId);
  if(lb) lb.classList.add('lactive');
  highlightAlpha(findAlphaIdx(ch));
}

function renderLetterStrip(word){
  const strip = document.getElementById('letter-strip');
  strip.innerHTML = '';
  [...word].forEach((ch,i)=>{
    if(ch===' ') return;
    const ai = findAlphaIdx(ch);
    const sound = ai>=0 ? ALPHA[ai].s : '?';
    const id = 'lb-'+i;
    const d = document.createElement('div');
    d.className = 'lbox'; d.id = id;
    d.innerHTML = '<span class="lchar">'+ch+'</span><span class="lsound">'+fmtSound(sound)+'</span>';
    d.onclick = ()=>clickLetter(ch, id);
    strip.appendChild(d);
  });
}

  letters: {},   // { 'α': {correct:0, wrong:0, name:'알파', streak:0, level:0, lastCorrect:0} }
  words: {},     // { 'greek': {correct:0, wrong:0, meaning:'', perfect:false} }

};
let trainSubMode = 'stats';
let alphaQueue = [];
let currentAlpha = null;

function startCountdown(seconds, callback) {
  if(countdownTimer) clearInterval(countdownTimer);
  let remaining = seconds;
  const el = document.getElementById('t-feedback');
  const origText = el.textContent;
  el.textContent = origText + '  (' + remaining + ')';
  countdownTimer = setInterval(() => {
    remaining--;
    if(remaining <= 0) {
      clearInterval(countdownTimer);
      countdownTimer = null;
      callback();
    } else {
      el.textContent = origText + '  (' + remaining + ')';
    }
  }, 1000);
}

// ── TTS (Web Speech API) ──
function speakGreek(text) {
  if(!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'el-GR';
  u.rate = 0.8;
  // Try to find Greek voice
  const voices = window.speechSynthesis.getVoices();
  const greek = voices.find(v => v.lang && v.lang.startsWith('el'));
  if(greek) u.voice = greek;
  window.speechSynthesis.speak(u);
}

// Preload voices

}

// Mastery levels: 0=미학습, 1=입문(1회정답), 2=학습중(3연속), 3=습득(5연속)
function getLevel(streak) {
  if(streak >= 5) return 3;
  if(streak >= 3) return 2;
  if(streak >= 1) return 1;
  return 0;
}
function getLevelName(lv) { return ['미학습','입문','학습중','습득'][lv]; }
function getLevelColor(lv) { return ['#ddd','#E8B84B','#C9922A','#8B6914'][lv]; }

function getUnlockedStage() {
  // Count mastered letters (level >= 2) in each stage
  let s1 = 0, s2 = 0;
  STAGES[0].letters.forEach(i => {
    const lc = ALPHA[i].g.split(' ')[1] || ALPHA[i].g;
    const s = trainStats.letters[lc];
    if(s && getLevel(s.streak) >= 2) s1++;
  });
  STAGES[1].letters.forEach(i => {
    const lc = ALPHA[i].g.split(' ')[1] || ALPHA[i].g;
    const s = trainStats.letters[lc];
    if(s && getLevel(s.streak) >= 2) s2++;
  });
  trainStats.mastery.stage1 = s1;
  trainStats.mastery.stage2 = s2;
  if(s1 >= STAGES[1].requiredMastery) {
    if(s2 >= STAGES[2].requiredMastery) return 3;
    return 2;
  }
  return 1;
}

  else if(tab==='word') { startWordTrainer(); document.getElementById('train-stats-panel').innerHTML=''; renderMiniStats(); renderHistory(); }
  else { document.getElementById('train-content').innerHTML=''; renderFullStats(); const h=document.getElementById('train-history'); if(h) h.innerHTML=''; }

// ── Stage-aware alpha queue ──
function buildAlphaQueue() {
  const maxStage = getUnlockedStage();
  let pool = [];
  STAGES.forEach(stage => {
    if(stage.id > maxStage) return;
    stage.letters.forEach(idx => {
      const a = ALPHA[idx];
      const lc = a.g.split(' ')[1] || a.g;
      const s = trainStats.letters[lc];
      // Weight: more wrong = more frequent, mastered = less frequent
      let weight = 1;
      if(s) {
        weight = Math.max(1, 1 + s.wrong * 2 - Math.floor(s.streak / 2));
        // Time decay: if last correct was recent, reduce weight
        if(s.lastCorrect && getLevel(s.streak) >= 3) weight = Math.max(1, weight - 2);
      }
      // Current stage letters get extra weight
      if(stage.id === currentStage) weight += 2;
      for(let i=0; i<weight; i++) pool.push(a);
    });
  });
  alphaQueue = pool.sort(() => Math.random() - 0.5);
}

function nextRandom(queue) {
  return queue[Math.floor(Math.random() * Math.min(queue.length, 10))];
}

// ── Alpha Trainer ──
function startAlphaTrainer() {
  buildAlphaQueue();
  currentAlpha = nextRandom(alphaQueue) || ALPHA[Math.floor(Math.random()*ALPHA.length)];
  alphaWrong = 0;
  const maxStage = getUnlockedStage();
  const lc = currentAlpha.g.split(' ')[1] || '';
  const s = trainStats.letters[lc];
  const level = s ? getLevel(s.streak) : 0;

  // Stage bar
  const stageBar = STAGES.map(st => {
    let cls = 'stage-pill';
    if(st.id <= maxStage) cls += ' unlocked';
    if(st.id === currentStage) cls += ' current';
    if(st.id > maxStage) cls += ' locked';
    const lock = st.id > maxStage ? '<span class="lock-icon">🔒</span>' : '';
    return `<div class="${cls}" onclick="${st.id<=maxStage?'currentStage='+st.id+';startAlphaTrainer()':''}">
      ${st.name}${lock}</div>`;
  }).join('');

  document.getElementById('train-content').innerHTML = `
    <div class="stage-bar">${stageBar}</div>
    <div class="train-card">
      <div class="streak-badge ${globalStreak>=3?'visible':''}" id="streak-badge">
        <span class="streak-fire">🔥</span><span>${globalStreak}</span>
      </div>
      <div class="train-prompt">${lc}</div>
      <div class="train-subprompt">이 글자의 소리는?</div>
      <div class="train-feedback" id="t-feedback"></div>
      <div id="ctx-feedback-area"></div>
    </div>
    <div class="train-input-row">
      <input class="train-input" id="t-input" placeholder="소리 입력..." autocomplete="off" spellcheck="false"/>
      <button class="train-submit" onclick="checkAlpha()">확인</button>
    </div>
    <div class="train-hint" id="t-hint"></div>
  `;
  const inp = document.getElementById('t-input');
  inp.focus();
  inp.onkeydown = e => {
    if(e.isComposing || e.keyCode === 229) return;
    if(e.key==='Enter') checkAlpha();
  };
}

function checkAlpha() {
  if(isProcessing) return;
  const inp = document.getElementById('t-input');
  const val = inp.value.trim().toLowerCase();
  if(!val) return;
  isProcessing = true;
  const a = currentAlpha;
  const lc = a.g.split(' ')[1] || a.g;
  const correct = a.s.toLowerCase().split('/').map(s=>s.trim());
  const krAnswers = (a.kr||[]).map(s=>s.toLowerCase().trim());
  const allAnswers = [...correct, ...krAnswers];

  if(!trainStats.letters[lc]) trainStats.letters[lc] = {correct:0, wrong:0, name:a.n, streak:0, level:0, lastCorrect:0};
  const st = trainStats.letters[lc];
  trainStats.total++; trainStats.session++;

  const ok = allAnswers.some(c => val===c || val.replace(/\s/g,'')===c.replace(/\s/g,''));

  const fb = document.getElementById('t-feedback');
  const ctxArea = document.getElementById('ctx-feedback-area');

  if(ok) {
    trainStats.correct++; st.correct++; st.streak++; st.lastCorrect = Date.now();
    const oldLevel = st.level;
    st.level = getLevel(st.streak);
    globalStreak++;

    fb.className='train-feedback correct';
    fb.textContent='✓  '+a.n+' · '+a.s;

    // Contextual correct feedback
    let ctxHtml = `<div class="ctx-feedback correct-feedback"><div class="ctx-title">정답</div><div class="ctx-body">${a.correctMsg||''}</div>`;
    if(a.example) ctxHtml += `<div class="ctx-example">예: ${a.example}</div>`;
    ctxHtml += '</div>';
    ctxArea.innerHTML = ctxHtml;

    // Level up animation
    if(st.level > oldLevel) {
      const card = document.querySelector('.train-card');
      card.classList.add('gold-flash');
      fb.textContent = `✓  레벨 업! ${getLevelName(st.level)} 달성`;
      setTimeout(()=>card.classList.remove('gold-flash'), 600);
    }

    // Flash the streak badge
    const badge = document.getElementById('streak-badge');
    if(globalStreak >= 3) {
      badge.className = 'streak-badge visible';
      badge.innerHTML = `<span class="streak-fire">🔥</span><span>${globalStreak} 연속</span>`;
    }

    inp.value='';
    renderMiniStats();
    saveIfLoggedIn();
    addHistory({letter:lc, greek:lc, pron:a.n+' · '+a.s, meaning:'', correct:true, type:'alpha'});
    speakGreek(lc);
    startCountdown(5, ()=>{ isProcessing = false; startAlphaTrainer(); });
  } else {
    st.wrong++; st.streak = 0; st.level = 0;
    alphaWrong++;
    globalStreak = 0;

    fb.className='train-feedback wrong';
    fb.textContent='✗  다시!';
    addHistory({letter:lc, greek:lc, pron:a.n+' · '+a.s, meaning:'', correct:false, type:'alpha'});

    // Contextual wrong feedback — show immediately
    let ctxHtml = '';
    if(a.trap) {
      ctxHtml = `<div class="ctx-feedback trap-feedback"><div class="ctx-title">함정 주의</div><div class="ctx-body">${a.trap}</div>`;
    } else {
      ctxHtml = `<div class="ctx-feedback trap-feedback"><div class="ctx-title">힌트</div><div class="ctx-body">${a.mnemonic||a.n+' = '+a.s}</div>`;
    }
    if(a.confuseWith) ctxHtml += `<div class="ctx-body" style="margin-top:4px;font-size:11px;color:#A0522D;">혼동 주의: ${a.confuseWith}</div>`;
    if(alphaWrong >= 2 && a.example) ctxHtml += `<div class="ctx-example">예: ${a.example}</div>`;
    ctxHtml += '</div>';
    ctxArea.innerHTML = ctxHtml;

    // Hide streak badge
    const badge = document.getElementById('streak-badge');
    badge.className = 'streak-badge';

    inp.value=''; inp.focus();
    isProcessing = false;
    renderMiniStats();
  }
}

// ── Word Trainer ──
function startWordTrainer() {
  let pool = [...WORDS].sort(() => Math.random() - 0.5);
  currentWord = pool[0];
  if(!currentWord) return;
  currentLetterIdx = 0; letterWrong = 0;
  renderWordCard();
}

// Format sound as stacked kr/en
function fmtSound(s) {
  if(!s) return '?';
  const parts = s.split('/').map(p=>p.trim());
  if(parts.length>=2) return parts[0]+'<br><span style="font-size:9px;color:#aaa;">'+parts[1]+'</span>';
  return s;
}

function getWordLetters(word) {
  return [...word].map(ch => {
    if(ch.trim()==='') return null;
    const ai = findAlphaIdx(ch);
    return {char:ch, sound:ai>=0?ALPHA[ai].s:null, alphaIdx:ai};
  }).filter(Boolean);
}

function renderWordCard() {
  const w = currentWord;
  const letters = getWordLetters(w.greek);
  const prog = letters.map((l,i)=>{
    let cls = 'lp-box' + (i<currentLetterIdx?' done':i===currentLetterIdx?' current':'');
    const show = i<currentLetterIdx;
    return `<div class="${cls}" id="lp-${i}"><span class="lp-char">${l.char}</span><span class="lp-sound${show?' revealed':''}">${show?fmtSound(l.sound):''}</span></div>`;
  }).join('');

  document.getElementById('train-content').innerHTML = `
    <div class="train-card">
      <div class="streak-badge ${globalStreak>=3?'visible':''}" id="streak-badge">
        <span class="streak-fire">🔥</span><span>${globalStreak} 연속</span>
      </div>
      <div class="train-subprompt">${w.meaning} · ${w.pos}</div>
      <div class="word-trainer-word">${w.greek}</div>
      <div class="letter-progress">${prog}</div>
      <div class="train-feedback" id="t-feedback"></div>
      <div id="ctx-feedback-area"></div>
    </div>
    <div class="train-input-row">
      <input class="train-input" id="t-input" placeholder="${currentLetterIdx+1}번째 글자 소리..." autocomplete="off" spellcheck="false"/>
      <button class="train-submit" onclick="checkWordLetter()">확인</button>
    </div>
    <div class="train-hint" id="t-hint"></div>
  `;
  const inp = document.getElementById('t-input');
  inp.focus();
  inp.onkeydown = e => {
    if(e.isComposing || e.keyCode === 229) return;
    if(e.key==='Enter') checkWordLetter();
  };
}

function checkWordLetter() {
  if(isProcessing) return;
  const inp = document.getElementById('t-input');
  const val = inp.value.trim().toLowerCase();
  if(!val) return;
  isProcessing = true;
  const w = currentWord;
  const letters = getWordLetters(w.greek);
  const letter = letters[currentLetterIdx];
  if(!letter){ isProcessing=false; return; }

  const correct = (letter.sound||'').toLowerCase().split('/').map(s=>s.trim());
  const alphaData = letter.alphaIdx >= 0 ? ALPHA[letter.alphaIdx] : null;
  const krAnswers = alphaData ? (alphaData.kr||[]).map(s=>s.toLowerCase().trim()) : [];
  const allAnswers = [...correct, ...krAnswers];

  const lc = letter.char;
  if(!trainStats.letters[lc]) trainStats.letters[lc]={correct:0,wrong:0,name:lc,streak:0,level:0,lastCorrect:0};
  if(!trainStats.words[w.greek]) trainStats.words[w.greek]={correct:0,wrong:0,meaning:w.meaning,perfect:true};

  trainStats.total++; trainStats.session++;
  const ok = allAnswers.some(c=>val===c||val.replace(/\s/g,'')===c.replace(/\s/g,''));

  const st = trainStats.letters[lc];
  const ctxArea = document.getElementById('ctx-feedback-area');

  if(ok) {
    trainStats.correct++; st.correct++; st.streak++; st.lastCorrect=Date.now();
    st.level = getLevel(st.streak);
    trainStats.words[w.greek].correct++;
    globalStreak++;
    letterWrong=0;

    const box=document.getElementById('lp-'+currentLetterIdx);
    if(box){
      box.className='lp-box done';
      box.querySelector('.lp-sound').className='lp-sound revealed';
      box.querySelector('.lp-sound').innerHTML=fmtSound(letter.sound);
      box.classList.add('gold-flash');
    }
    currentLetterIdx++;

    document.getElementById('t-feedback').className='train-feedback correct';
    document.getElementById('t-feedback').textContent='✓';
    ctxArea.innerHTML = '';
    inp.value='';

    // Update streak badge
    const badge = document.getElementById('streak-badge');
    if(globalStreak >= 3) {
      badge.className = 'streak-badge visible';
      badge.innerHTML = `<span class="streak-fire">🔥</span><span>${globalStreak} 연속</span>`;
    }

    renderMiniStats();

    if(currentLetterIdx>=letters.length){
      // Letters done — now ask for whole word pronunciation
      document.getElementById('t-feedback').className='train-feedback correct';
      document.getElementById('t-feedback').textContent='✓ 글자 완료! 이제 전체 발음을 입력해봐';
      ctxArea.innerHTML = '';
      inp.value='';
      inp.disabled=false;
      inp.placeholder='전체 발음 입력... (예: '+w.pron+')';
      inp.focus();
      // Switch handler to whole-word check
      inp.onkeydown = e => {
        if(e.isComposing || e.keyCode === 229) return;
        if(e.key==='Enter') checkWholeWord();
      };
      document.querySelector('.train-submit').onclick = checkWholeWord;
      isProcessing = false;
    } else {
      const nb=document.getElementById('lp-'+currentLetterIdx);
      if(nb) nb.className='lp-box current';
      inp.placeholder=(currentLetterIdx+1)+'번째 글자 소리...'; inp.focus();
      isProcessing = false;
    }
  } else {
    st.wrong++; st.streak=0; st.level=0;
    trainStats.words[w.greek].wrong++;
    trainStats.words[w.greek].perfect = false;
    letterWrong++;
    globalStreak = 0;

    document.getElementById('t-feedback').className='train-feedback wrong';
    document.getElementById('t-feedback').textContent='✗  다시!';

    const box=document.getElementById('lp-'+currentLetterIdx);
    if(box){box.classList.add('wrong-flash');setTimeout(()=>box.classList.remove('wrong-flash'),500);}

    // Show contextual feedback immediately
    if(alphaData) {
      let ctxHtml = '';
      if(alphaData.trap) {
        ctxHtml = `<div class="ctx-feedback trap-feedback"><div class="ctx-title">함정 주의</div><div class="ctx-body">${alphaData.trap}</div></div>`;
      } else {
        ctxHtml = `<div class="ctx-feedback trap-feedback"><div class="ctx-title">힌트</div><div class="ctx-body">${alphaData.mnemonic||alphaData.n+' = '+(letter.sound||'?')}</div></div>`;
      }
      ctxArea.innerHTML = ctxHtml;
    }

    // Hide streak badge
    const badge = document.getElementById('streak-badge');
    badge.className = 'streak-badge';

    inp.value=''; inp.focus();
    isProcessing = false;
    renderMiniStats();
  }
}

// ── Whole word pronunciation check ──
function checkWholeWord() {
  if(isProcessing) return;
  const inp = document.getElementById('t-input');
  const val = inp.value.trim().toLowerCase();
  if(!val) return;
  isProcessing = true;
  const w = currentWord;
  const fb = document.getElementById('t-feedback');
  const ctxArea = document.getElementById('ctx-feedback-area');

  // Accept: exact pron match, fuzzy match, or english transliteration
  const pronNorm = tok(w.pron);
  const engNorm = tok(w.english.split('/')[0]);
  const valNorm = tok(val);

  // Fuzzy Korean match
  const pronVariants = fuzzyKr(w.pron);
  const ok = pronVariants.some(p => valNorm === p || p.includes(valNorm) && valNorm.length >= 2)
    || valNorm === pronNorm
    || valNorm === engNorm;

  if(ok) {
    fb.className = 'train-feedback correct';
    fb.textContent = '✓  ' + w.greek + ' = ' + w.pron;
    if(w.completionMsg) {
      ctxArea.innerHTML = `<div class="ctx-feedback correct-feedback"><div class="ctx-title">단어 완성!</div><div class="ctx-body">${w.completionMsg}</div></div>`;
    }
    const card = document.querySelector('.train-card');
    card.classList.add('gold-flash');
    inp.disabled = true;
    document.querySelector('.train-submit').disabled = true;
    saveIfLoggedIn();
    addHistory({greek:w.greek, pron:w.pron, meaning:w.meaning, correct:true, type:'word'});
    speakGreek(w.greek);
    startCountdown(5, () => { isProcessing = false; startWordTrainer(); });
  } else {
    fb.className = 'train-feedback wrong';
    fb.textContent = '✗  다시! 전체 발음을 입력해봐';
    addHistory({greek:w.greek, pron:w.pron, meaning:w.meaning, correct:false, type:'word'});
    ctxArea.innerHTML = `<div class="ctx-feedback trap-feedback"><div class="ctx-title">힌트</div><div class="ctx-body">위 글자들의 소리를 이어서 읽어봐</div></div>`;
    inp.value = '';
    inp.focus();
    isProcessing = false;
  }
}

// ── Firebase load ──
window.loadTrainStats = function(data) {
  if(data.total) trainStats.total = data.total;
  if(data.correct) trainStats.correct = data.correct;
  if(data.letters) trainStats.letters = data.letters;
  if(data.words) trainStats.words = data.words;
  if(data.mastery) trainStats.mastery = data.mastery;
  if(trainSubMode === 'stats') renderFullStats();
  else renderMiniStats();
};

// ── Mini Stats ──
function renderMiniStats() {
  const el = document.getElementById('train-stats-panel');
  if(!el||trainSubMode==='stats') return;
  const rate = trainStats.total>0 ? Math.round(trainStats.correct/trainStats.total*100) : 0;

  // Count mastered
  let mastered = 0, learning = 0;
  Object.values(trainStats.letters).forEach(v => {
    const lv = getLevel(v.streak||0);
    if(lv >= 3) mastered++;
    else if(lv >= 1) learning++;
  });

  el.innerHTML = `
    <div class="stats-panel" style="padding:0.75rem 1rem;">
      <div style="display:flex;gap:12px;align-items:center;font-size:12px;color:#888;flex-wrap:wrap;">
        <span>세션 <b style="color:#C9922A">${trainStats.session}</b></span>
        <span>정답률 <b style="color:#C9922A">${rate}%</b></span>
        <span>습득 <b style="color:#8B6914">${mastered}</b>/24</span>
        <span>학습중 <b style="color:#E8B84B">${learning}</b></span>
        ${globalStreak>=3?`<span>🔥 <b style="color:#C9922A">${globalStreak}</b> 연속</span>`:''}
      </div>
      <div class="mastery-bar"><div class="mastery-fill" style="width:${Math.round(mastered/24*100)}%"></div></div>
    </div>
  `;
}

// ── Full Stats ──
function renderFullStats() {
  const rate = trainStats.total>0?Math.round(trainStats.correct/trainStats.total*100):0;

  let mastered=0, learning=0, beginner=0, unseen=0;
  const alphaStatsHtml = ALPHA.map(a=>{
    const lc = a.g.split(' ')[1]||a.g.split(' ')[0];
    const s = trainStats.letters[lc];
    let cls='asg-item asg-none', rateStr='-', levelStr='', lvl=0;
    if(s&&(s.correct+s.wrong)>0){
      const r=Math.round(s.correct/(s.correct+s.wrong)*100);
      lvl = getLevel(s.streak||0);
      cls='asg-item '+(lvl>=3?'asg-mastered':lvl>=2?'asg-good':r>=50?'asg-item':'asg-bad');
      rateStr=r+'%';
      levelStr=getLevelName(lvl);
      if(lvl>=3) mastered++;
      else if(lvl>=2) learning++;
      else beginner++;
    } else { unseen++; }
    return `<div class="${cls}"><span class="asg-char">${lc}</span><span class="asg-rate">${rateStr}</span><span class="asg-level" style="color:${getLevelColor(lvl)}">${levelStr}</span></div>`;
  }).join('');

  const learnedWords = Object.entries(trainStats.words);
  const weakLetters5 = Object.entries(trainStats.letters).filter(([,v])=>v.wrong>0).sort((a,b)=>b[1].wrong-a[1].wrong).slice(0,5);
  const weakWords5 = [...learnedWords].filter(([,v])=>v.wrong>0).sort((a,b)=>b[1].wrong-a[1].wrong).slice(0,5);

  const wordRowsHtml = learnedWords.length ? learnedWords
    .sort((a,b)=>{
      const ra=a[1].correct/(a[1].correct+a[1].wrong||1);
      const rb=b[1].correct/(b[1].correct+b[1].wrong||1);
      return ra-rb;
    })
    .map(([g,v])=>{
      const r=v.correct+v.wrong>0?Math.round(v.correct/(v.correct+v.wrong)*100):0;
      return `<div class="word-stat-row">
        <span class="word-stat-greek">${g}</span>
        <span class="word-stat-meaning">${v.meaning}</span>
        <span class="word-stat-rate${r<60?' bad':''}">${r}%</span>
      </div>`;
    }).join('')
    : '<div style="font-size:12px;color:#bbb;padding:0.5rem 0;">아직 연습한 단어가 없어</div>';

  document.getElementById('train-content').innerHTML='';
  document.getElementById('train-stats-panel').innerHTML = `
    <div class="stats-panel">
      <div class="stats-section">
        <div class="stats-section-title">전체 현황</div>
        <div class="stats-grid">
          <div class="stat-box"><span class="stat-num">${trainStats.session}</span><span class="stat-lbl">이번 세션</span></div>
          <div class="stat-box"><span class="stat-num">${trainStats.total}</span><span class="stat-lbl">총 시도</span></div>
          <div class="stat-box"><span class="stat-num">${trainStats.correct}</span><span class="stat-lbl">정답</span></div>
          <div class="stat-box"><span class="stat-num">${rate}%</span><span class="stat-lbl">정답률</span></div>
        </div>
      </div>

      <div class="stats-section">
        <div class="stats-section-title">알파벳 마스터리 (${mastered}/24 습득)</div>
        <div class="mastery-bar"><div class="mastery-fill" style="width:${Math.round(mastered/24*100)}%"></div></div>
        <div class="mastery-label">습득 ${mastered} · 학습중 ${learning} · 입문 ${beginner} · 미학습 ${unseen}</div>
        <div class="alpha-stats-grid" style="margin-top:8px;">${alphaStatsHtml}</div>
      </div>

      <div class="stats-section">
        <div class="stats-section-title">단계별 진행</div>
        <div style="font-size:12px;color:#555;line-height:1.8;">
          ${STAGES.map(st=>{
            const unlocked = st.id <= getUnlockedStage();
            const count = st.letters.reduce((acc,i)=>{
              const lc=ALPHA[i].g.split(' ')[1]||ALPHA[i].g;
              const s=trainStats.letters[lc];
              return acc+(s&&getLevel(s.streak||0)>=2?1:0);
            },0);
            return `<div>${unlocked?'✅':'🔒'} ${st.name} — ${st.desc} <span style="color:#C9922A;font-weight:600;">${count}/${st.letters.length}</span></div>`;
          }).join('')}
        </div>
      </div>

      ${weakLetters5.length?`<div class="stats-section">
        <div class="stats-section-title">자주 틀리는 글자 Top 5</div>
        <div class="weak-list">${weakLetters5.map(([ch,v])=>`<div class="weak-item">${ch}<span class="wi-sub">오답 ${v.wrong}회 · 정답 ${v.correct}회</span></div>`).join('')}</div>
      </div>`:''}

      <div class="stats-section">
        <div class="stats-section-title">학습한 단어 ${learnedWords.length}개</div>
        <div>${wordRowsHtml}</div>
      </div>

      ${weakWords5.length?`<div class="stats-section">
        <div class="stats-section-title">자주 틀리는 단어 Top 5</div>
        <div class="weak-list">${weakWords5.map(([g,v])=>`<div class="weak-item">${g}<span class="wi-sub">${v.meaning} · 오답 ${v.wrong}회</span></div>`).join('')}</div>
      </div>`:''}
    </div>
  `;
}
</script>
